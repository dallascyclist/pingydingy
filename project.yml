name: PingyDingy
options:
  bundleIdPrefix: com
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.3"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: BB4S225265
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: com.pingydingy

targets:
  PingyDingy:
    type: application
    platform: iOS
    sources:
      - path: PingyDingy
        excludes:
          - "Info.plist"
      - path: Sounds
        type: folder
        buildPhase: resources
    info:
      path: PingyDingy/Info.plist
      properties:
        CFBundleDisplayName: PingyDingy
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "12"
        ITSAppUsesNonExemptEncryption: false
        LSSupportsOpeningDocumentsInPlace: false
        UISupportsDocumentBrowser: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UTExportedTypeDeclarations:
          - UTTypeConformsTo:
              - public.json
            UTTypeIdentifier: com.pingydingy.config
            UTTypeDescription: PingyDingy Configuration
            UTTypeTagSpecification:
              public.filename-extension:
                - pingydingy
        CFBundleDocumentTypes:
          - CFBundleTypeName: PingyDingy Configuration
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.pingydingy.config
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pingydingy
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "12"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
    dependencies: []

  PingyDingyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PingyDingyTests
    dependencies:
      - target: PingyDingy
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PingyDingy.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PingyDingy"
